<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore | Resume Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&family=League+Spartan:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg: #f4f4f9;
            --accent: #000;
            --sidebar-width: 280px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }

        /* --- DASHBOARD VIEW --- */
        .dashboard { padding: 40px; text-align: center; display: block; }
        .dashboard h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }
        
        .template-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .template-card { 
            background: #fff; 
            padding: 10px; 
            border-radius: 8px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 2px solid transparent;
        }
        .template-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .template-card img { width: 100%; border-radius: 4px; display: block; background: #eee; }
        .template-card p { margin-top: 15px; font-weight: 600; font-size: 14px; }

        /* --- EDITOR VIEW --- */
        .editor-view { display: none; flex-direction: column; align-items: center; }
        
        .toolbar { 
            width: 100%; padding: 15px 40px; background: #fff; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
            box-sizing: border-box;
        }

        .btn { padding: 10px 20px; border: none; cursor: pointer; font-weight: 600; font-size: 12px; border-radius: 5px; }
        .btn-back { background: #eee; }
        .btn-save { background: #000; color: #fff; }

        #resume-paper { 
            width: 210mm; min-height: 297mm; background: #fff; margin: 40px 0; 
            box-shadow: 0 0 50px rgba(0,0,0,0.1); box-sizing: border-box; display: flex;
        }

        /* Common Editable Logic */
        [contenteditable="true"]:focus { background: #fffde7; outline: 2px solid #000; padding: 2px; }

        /* --- TEMPLATE STYLES --- */
        /* Template 1: Modernist (Sidebar) */
        .tp-modernist .sidebar { width: 35%; background: #1a1a2e; color: #fff; padding: 40px; box-sizing: border-box; }
        .tp-modernist .main { width: 65%; padding: 60px; box-sizing: border-box; }

        /* Template 2: Executive (Full Width) */
        .tp-executive { flex-direction: column !important; padding: 60px 80px !important; }
        .tp-executive .header { border-bottom: 4px solid #000; padding-bottom: 20px; margin-bottom: 40px; text-align: center; }

        /* Image Mask Logic */
        .photo-container { 
            width: 140px; height: 140px; border-radius: 50%; overflow: hidden; 
            border: 4px solid rgba(255,255,255,0.2); margin: 0 auto 20px; cursor: pointer; position: relative;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .photo-overlay { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); 
            color: #fff; font-size: 10px; text-align: center; padding: 5px 0; opacity: 0; transition: 0.3s;
        }
        .photo-container:hover .photo-overlay { opacity: 1; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="dashboard" id="dashboard">
        <h1>Aethercore Resume Studio</h1>
        <div class="template-grid">
            <div class="template-card" onclick="openEditor('tp-modernist')">
                <div style="height:200px; background:linear-gradient(90deg, #1a1a2e 35%, #fff 35%);"></div>
                <p>The Modernist</p>
            </div>
            <div class="template-card" onclick="openEditor('tp-executive')">
                <div style="height:200px; background:#fff; border:1px solid #eee;">
                    <div style="margin:20px; border-bottom:3px solid #000; height:30px;"></div>
                </div>
                <p>The Executive</p>
            </div>
        </div>
    </div>

    <div class="editor-view" id="editor-view">
        <div class="toolbar">
            <button class="btn btn-back" onclick="closeEditor()">← Gallery</button>
            <div class="logo" style="font-family:'League Spartan'; font-weight:800;">AETHERCORE</div>
            <button class="btn btn-save" onclick="downloadPDF()">Download PDF</button>
        </div>

        <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">

        <div id="resume-paper" class="tp-modernist">
            <div class="sidebar" id="sidebar-bg">
                <div class="photo-container" onclick="document.getElementById('imageInput').click()">
                    <img id="user-photo" src="https://via.placeholder.com/150" alt="Profile">
                    <div class="photo-overlay">EDIT PHOTO</div>
                </div>
                <h2 contenteditable="true" style="font-size:12px; letter-spacing:3px; color:#aaa; text-align:center;">CONTACT</h2>
                <p contenteditable="true" style="font-size:13px; text-align:center; opacity:0.8;">yourname@email.com<br>+1 555 0123</p>
            </div>

            <div class="main">
                <h1 contenteditable="true" id="user-name">Your Name</h1>
                <p contenteditable="true" style="letter-spacing:5px; color:#666; text-transform:uppercase; font-size:12px;">Professional Title</p>
                <hr style="margin:30px 0; border:0; border-top:1px solid #eee;">
                
                <h2 contenteditable="true" style="font-size:11px; letter-spacing:2px; color:#999;">EXPERIENCE</h2>
                <div class="entry">
                    <b contenteditable="true">Job Title</b> | <i contenteditable="true">Company Name</i>
                    <p contenteditable="true" style="font-size:14px; line-height:1.6;">Describe your high-impact achievements here. Click to edit any text.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dashboard = document.getElementById('dashboard');
        const editor = document.getElementById('editor-view');
        const paper = document.getElementById('resume-paper');

        function openEditor(templateClass) {
            dashboard.style.display = 'none';
            editor.style.display = 'flex';
            paper.className = templateClass;
            
            // Adjust sidebar color if Executive
            if(templateClass === 'tp-executive') {
                document.getElementById('sidebar-bg').style.display = 'none';
                paper.style.padding = "60px";
            } else {
                document.getElementById('sidebar-bg').style.display = 'block';
                paper.style.padding = "0";
            }
        }

        function closeEditor() {
            dashboard.style.display = 'block';
            editor.style.display = 'none';
        }

        function handleImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('user-photo');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function downloadPDF() {
            const btn = document.querySelector('.btn-save');
            btn.innerHTML = "Generating...";
            
            const options = {
                margin: 0,
                filename: 'My_Resume.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(paper).save().then(() => {
                btn.innerHTML = "Download PDF";
            });
        }
    </script>
</body>
</html>
