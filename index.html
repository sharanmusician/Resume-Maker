<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore | Page Forge Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=League+Spartan:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f0f2f5; --white: #fff; --accent: #2d3475; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }

        /* GALLERY LOOK */
        #gallery-view { padding: 50px; display: block; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; max-width: 1100px; margin: 40px auto; }
        .card { background: var(--white); padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: scale(1.03); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card .preview { height: 320px; background: #eee; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }

        /* EDITOR LOOK */
        #editor-view { display: none; flex-direction: column; align-items: center; }
        .nav { width: 100%; padding: 15px 30px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-sizing: border-box;}
        .btn { padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-dl { background: #000; color: #fff; }

        /* THE WINDOW */
        #viewport-container { padding: 40px 0; perspective: 1000px; }
        #resume-window { 
            width: 210mm; min-height: 297mm; background: #fff; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.2); 
            transform: translateZ(0); /* For crispness */
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="gallery-view">
        <h1 style="font-weight:800; font-size: 40px;">AETHERCORE STUDIO</h1>
        <div class="grid">
            <div class="card" onclick="loadTemplate('modernist.html')">
                <div class="preview" style="background: linear-gradient(135deg, #1a1a2e 30%, #fff 30%);"></div>
                <p>The Modernist</p>
            </div>
            <div class="card" onclick="loadTemplate('executive.html')">
                <div class="preview" style="background: #fff; border: 1px solid #eee; display: flex; align-items: center; justify-content: center;">
                    <div style="width: 80%; border-top: 5px solid #000;"></div>
                </div>
                <p>The Executive</p>
            </div>
        </div>
    </div>

    <div id="editor-view">
        <div class="nav">
            <button class="btn" onclick="location.reload()">← Gallery</button>
            <div style="font-family:'League Spartan'; font-weight:700;">PAGE FORGE V4</div>
            <button class="btn btn-dl" onclick="downloadPDF()">Export Design</button>
        </div>

        <input type="file" id="imgPicker" accept="image/*" onchange="updateImage(event)">

        <div id="viewport-container">
            <div id="resume-window"></div>
        </div>
    </div>

    <script>
        async function loadTemplate(fileName) {
            const gallery = document.getElementById('gallery-view');
            const editor = document.getElementById('editor-view');
            const window = document.getElementById('resume-window');

            try {
                const response = await fetch(fileName);
                const html = await response.text();
                
                window.innerHTML = html; // Inject the template
                gallery.style.display = 'none';
                editor.style.display = 'flex';
                
                // Re-bind image click if template has a profile image
                setTimeout(bindImageClick, 100);
            } catch (err) {
                alert("Please run this on a local server or GitHub Pages to load files.");
                console.error(err);
            }
        }

        function bindImageClick() {
            const profile = document.getElementById('user-photo');
            if(profile) {
                profile.style.cursor = "pointer";
                profile.onclick = () => document.getElementById('imgPicker').click();
            }
        }

        function updateImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('user-photo');
                if(img) img.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function downloadPDF() {
            const target = document.getElementById('resume-window');
            const opt = {
                margin: 0,
                filename: 'Aethercore_Design.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 4, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(target).save();
        }
    </script>
</body>
</html>
